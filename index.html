<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Star Tapetes — Relatórios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --terra: #C4614A;
    --grafite: #1C1C1C;
    --bege: #FAF8F5;
    --bege-brd: #E8E0D8;
    --cinza: #7A7A7A;
    --verde: #2E7D32;
    --verm: #C62828;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bege);
    color: var(--grafite);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--grafite);
  }
  .login-box {
    background: var(--bege);
    width: 380px;
    padding: 48px 40px;
    position: relative;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--terra);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--grafite);
  }
  .login-logo .brand span { color: var(--terra); }
  .login-logo .sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--cinza);
    margin-top: 2px;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--grafite);
    margin-bottom: 24px;
    text-align: center;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cinza);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--bege-brd);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--grafite);
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--terra); }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--grafite);
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: background .2s;
  }
  .btn-login:hover { background: var(--terra); }
  .login-error {
    color: var(--verm);
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    display: none;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }
  .topbar {
    background: var(--grafite);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 3px;
    color: white;
  }
  .topbar .brand span { color: var(--terra); }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar .vendedor-nome {
    font-size: 13px;
    color: #AAAAAA;
  }
  .btn-sair {
    font-size: 12px;
    color: #AAAAAA;
    background: none;
    border: 1px solid #444;
    padding: 5px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
  }
  .btn-sair:hover { border-color: var(--terra); color: var(--terra); }

  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    color: var(--grafite);
    margin-bottom: 4px;
  }
  .page-sub {
    font-size: 13px;
    color: var(--cinza);
    margin-bottom: 32px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--bege-brd);
    margin-bottom: 28px;
  }
  .tab {
    padding: 10px 24px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--cinza);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all .2s;
  }
  .tab.active { color: var(--terra); border-bottom-color: var(--terra); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--grafite); }

  /* Lista de relatórios */
  .relatorios-lista { display: flex; flex-direction: column; gap: 12px; }
  .relatorio-card {
    background: white;
    border: 1px solid var(--bege-brd);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color .2s, box-shadow .2s;
  }
  .relatorio-card:hover {
    border-color: var(--terra);
    box-shadow: 0 2px 12px rgba(196,97,74,0.08);
  }
  .relatorio-card .info {}
  .relatorio-card .data {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--grafite);
  }
  .relatorio-card .tipo {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cinza);
    margin-top: 2px;
  }
  .btn-baixar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--grafite);
    color: white;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.5px;
    font-family: 'DM Sans', sans-serif;
    transition: background .2s;
  }
  .btn-baixar:hover { background: var(--terra); }
  .btn-baixar svg { width: 14px; height: 14px; }

  .vazio {
    text-align: center;
    padding: 60px 20px;
    color: var(--cinza);
  }
  .vazio p { font-size: 14px; margin-top: 8px; }

  /* Linha terracota decorativa */
  .decor-line {
    height: 3px;
    background: var(--terra);
    width: 40px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .login-box { width: 100%; margin: 20px; padding: 36px 24px; }
    .topbar { padding: 0 16px; }
    .container { padding: 24px 16px; }
    .relatorio-card { flex-direction: column; align-items: flex-start; gap: 14px; }
    .btn-baixar { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">VIA <span>✦</span> STAR</div>
      <div class="sub">TAPETES</div>
    </div>
    <div class="login-title">Portal de Relatórios</div>
    <div class="field">
      <label>Vendedor</label>
      <input type="text" id="input-vendedor" placeholder="Seu nome" autocomplete="off">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="input-senha" placeholder="••••••••" autocomplete="off">
    </div>
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">VIA <span>✦</span> STAR</div>
    <div class="topbar-right">
      <span class="vendedor-nome" id="nome-exibido"></span>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>
  <div class="container">
    <div class="decor-line"></div>
    <div class="page-title">Meus Relatórios</div>
    <div class="page-sub" id="page-sub">Bem-vindo! Aqui estão seus relatórios de desempenho.</div>

    <div class="tabs">
      <button class="tab active" onclick="mudarTab('semanal', this)">Semanais</button>
      <button class="tab" onclick="mudarTab('mensal', this)">Mensais</button>
    </div>

    <div id="lista-relatorios" class="relatorios-lista"></div>
  </div>
</div>

<script>
// ── Credenciais dos vendedores ────────────────────────────────────────────────
// Formato: "NOME_EXATO_DO_CSV": { senha: "senha123", display: "Nome Exibido" }
// O script Python atualiza esse objeto automaticamente via publishe_site()
const VENDEDORES = VENDEDORES_JSON_PLACEHOLDER;

// ── Repositório dos PDFs ──────────────────────────────────────────────────────
const REPO_BASE = "https://raw.githubusercontent.com/luscatorvi/viastar-relatorios/main/relatorios";

let vendedorAtual = null;
let tabAtual = 'semanal';

function fazerLogin() {
  const nome  = document.getElementById('input-vendedor').value.trim().toUpperCase();
  const senha = document.getElementById('input-senha').value.trim();
  const erro  = document.getElementById('login-error');

  const vendedor = VENDEDORES[nome];
  if (!vendedor || vendedor.senha !== senha) {
    erro.style.display = 'block';
    return;
  }

  erro.style.display = 'none';
  vendedorAtual = nome;
  document.getElementById('nome-exibido').textContent = vendedor.display;
  document.getElementById('page-sub').textContent =
    `Bem-vindo, ${vendedor.display}! Aqui estão seus relatórios de desempenho.`;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  carregarRelatorios('semanal');
}

function sair() {
  vendedorAtual = null;
  document.getElementById('input-vendedor').value = '';
  document.getElementById('input-senha').value = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

function mudarTab(tipo, btn) {
  tabAtual = tipo;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  carregarRelatorios(tipo);
}

async function carregarRelatorios(tipo) {
  const lista = document.getElementById('lista-relatorios');
  lista.innerHTML = '<div class="vazio"><p>Carregando...</p></div>';

  // Busca o índice de arquivos do vendedor
  const nomeArquivo = vendedorAtual.replace(/ /g,'_').replace(/\//g,'-');
  const indexUrl = `${REPO_BASE}/${nomeArquivo}/index.json`;

  try {
    const res = await fetch(indexUrl + '?t=' + Date.now());
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    const arquivos = (data[tipo] || []).sort().reverse();

    if (arquivos.length === 0) {
      lista.innerHTML = '<div class="vazio"><p>Nenhum relatório disponível ainda.</p><p>Os relatórios aparecem aqui automaticamente toda semana.</p></div>';
      return;
    }

    lista.innerHTML = arquivos.map(arq => {
      const url = `${REPO_BASE}/${nomeArquivo}/${arq}`;
      // Parse data do nome: KEILA_SP_semanal_28042026.pdf
      const match = arq.match(/(\d{2})(\d{2})(\d{4})/);
      const dataStr = match ? `${match[1]}/${match[2]}/${match[3]}` : arq;
      const tipoLabel = tipo === 'semanal' ? 'Relatório Semanal' : 'Relatório Mensal';
      return `
        <div class="relatorio-card">
          <div class="info">
            <div class="data">${dataStr}</div>
            <div class="tipo">${tipoLabel}</div>
          </div>
          <a href="${url}" target="_blank" class="btn-baixar" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Baixar PDF
          </a>
        </div>`;
    }).join('');
  } catch {
    lista.innerHTML = '<div class="vazio"><p>Nenhum relatório disponível ainda.</p><p>Os relatórios aparecem aqui automaticamente toda semana.</p></div>';
  }
}

// Enter no campo senha
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('input-senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
  });
  document.getElementById('input-vendedor').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('input-senha').focus();
  });
});
</script>
</body>
</html>
